name: Azure Resource Inventory (OIDC + Blob + Email)

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      subscriptionId:
        description: 'Specific subscription ID (optional)'
        required: false
        default: ''
      resourceGroup:
        description: 'Specific resource group (optional)'
        required: false
        default: ''
      reportName:
        description: 'Custom report name (optional)'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  run-inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Install Linux Graphics Dependencies for ImportExcel
        run: |
          sudo apt-get -y update
          sudo apt-get install -y --no-install-recommends libgdiplus libc6-dev

      - name: Download and Setup Stable ARI and Dependencies
        shell: pwsh
        run: |
          # 1. Install ImportExcel which works fine natively
          Install-Module -Name ImportExcel -Force -Scope CurrentUser

          # 2. Pull the exact stable 3.1.2 package binary directly from the PSGallery storage mirror
          $packageUrl = "https://www.powershellgallery.com/api/v2/package/AzureResourceInventory/3.1.2"
          Invoke-WebRequest -Uri $packageUrl -OutFile "$HOME/ari_stable.zip"
          
          # 3. Unpack the files cleanly into a designated module directory
          Expand-Archive -Path "$HOME/ari_stable.zip" -DestinationPath "$HOME/AzureResourceInventory" -Force

      - name: Run ARI
        shell: pwsh
        run: |
          $manifestPath = "$HOME/AzureResourceInventory/AzureResourceInventory.psd1"

          # Cleanly strip the missing Az.CostManagement module from the local manifest file array
          $manifestContent = Get-Content $manifestPath -Raw
          $manifestContent = $manifestContent -replace ",\s*'Az\.CostManagement'|\s*'Az\.CostManagement'\s*,", ""
          Set-Content -Path $manifestPath -Value $manifestContent -Force

          # Import the patched manifest file
          Import-Module $manifestPath -Force

          $params = @{}
          if ("${{ github.event.inputs.subscriptionId }}" -ne "") {
              $params.Add("SubscriptionID", "${{ github.event.inputs.subscriptionId }}")
          }
          if ("${{ github.event.inputs.resourceGroup }}" -ne "") {
              $params.Add("ResourceGroup", "${{ github.event.inputs.resourceGroup }}")
          }
          if ("${{ github.event.inputs.reportName }}" -ne "") {
              $params.Add("ReportName", "${{ github.event.inputs.reportName }}")
          } else {
              $params.Add("ReportName", "AzureInventory_$(Get-Date -Format 'yyyyMMdd')")
          }

          # CRITICAL BYPASS: Stops the tool from trying to self-update via a broken module path stream
          $params.Add("SkipUpdateCheck", $true)

          # Run the inventory engine
          Invoke-ARI @params

          # Prep workspace for extraction
          New-Item -Path "$env:GITHUB_WORKSPACE/ari-reports" -ItemType Directory -Force

          # Consolidate sheets
          if (Test-Path "$HOME/AzureResourceInventory/*.xlsx") {
              Move-Item -Path "$HOME/AzureResourceInventory/*.xlsx" -Destination "$env:GITHUB_WORKSPACE/ari-reports/" -Force
          }
          if (Test-Path "$HOME/AzureResourceInventory/*.xml") {
              Move-Item -Path "$HOME/AzureResourceInventory/*.xml" -Destination "$env:GITHUB_WORKSPACE/ari-reports/" -Force
          }

      - name: Upload to Azure Blob Storage
        shell: pwsh
        run: |
          $storageAccount = "${{ secrets.AZURE_STORAGE_ACCOUNT }}"
          $container = "ari-reports"
          $ctx = New-AzStorageContext -StorageAccountName $storageAccount -UseConnectedAccount

          Get-ChildItem -Path "$env:GITHUB_WORKSPACE/ari-reports" -File | ForEach-Object {
              Set-AzStorageBlobContent -File $_.FullName -Container $container -Blob $_.Name -Context $ctx -Force
          }

      - name: Send Email Notification with Attachment
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Azure Resource Inventory Report - Run ID ${{ github.run_id }}
          body: |
            Hello Team,
            
            The automated Azure Resource Inventory execution has completed successfully.
            
            - A long-term backup copy has been securely uploaded to the Azure Blob Container: "ari-reports".
            - The raw file has been attached directly to this distribution notification.
            
            Best Regards,
            Cloud Infrastructure Automation Bot
          to: MoizJawadwala@synergetics-consulting.com, SunnyRana@synergetics-consulting.com
          cc: AkshayWayal@synergetics-consulting.com, YogeshKhairnar@synergetics-consulting.com
 
          from: Azure Inventory Automation <${{ secrets.EMAIL_USERNAME }}>
          attachments: |
            ari-reports/*
