name: Azure Resource Inventory (OIDC + Blob + Email)

on:
  schedule:
    - cron: '0 8 * * 1'

  workflow_dispatch:
    inputs:
      subscriptionId:
        description: 'Specific Subscription ID (Optional)'
        required: false
        default: ''

      resourceGroup:
        description: 'Specific Resource Group (Optional)'
        required: false
        default: ''

      reportName:
        description: 'Custom Report Name (Optional)'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  run-inventory:
    runs-on: ubuntu-latest

    steps:

      # Checkout Repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Azure Login using OIDC
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      # Install Linux Dependencies
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            libgdiplus \
            libc6-dev \
            unzip

      # Install PowerShell Modules
      - name: Install Required PowerShell Modules
        shell: pwsh
        run: |

          Write-Host "Installing NuGet Provider..."
          Install-PackageProvider -Name NuGet -Force

          Write-Host "Trusting PSGallery..."
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

          Write-Host "Installing Az Module..."
          Install-Module `
            -Name Az `
            -Repository PSGallery `
            -Force `
            -AllowClobber `
            -Scope CurrentUser

          Write-Host "Installing ImportExcel..."
          Install-Module `
            -Name ImportExcel `
            -Repository PSGallery `
            -Force `
            -AllowClobber `
            -Scope CurrentUser

          Write-Host "Installing AzureResourceInventory..."
          Install-Module `
            -Name AzureResourceInventory `
            -Repository PSGallery `
            -Force `
            -AllowClobber `
            -Scope CurrentUser

      # Run Azure Resource Inventory
      - name: Run Azure Resource Inventory
        shell: pwsh
        run: |

          Write-Host "Importing AzureResourceInventory Module..."
          Import-Module AzureResourceInventory -Force

          Write-Host "Creating report parameters..."

          $params = @{
              ReportName = "AzureInventory_$(Get-Date -Format 'yyyyMMdd')"
          }

          if ("${{ github.event.inputs.subscriptionId }}" -ne "") {
              $params["SubscriptionID"] = "${{ github.event.inputs.subscriptionId }}"
          }

          if ("${{ github.event.inputs.resourceGroup }}" -ne "") {
              $params["ResourceGroup"] = "${{ github.event.inputs.resourceGroup }}"
          }

          if ("${{ github.event.inputs.reportName }}" -ne "") {
              $params["ReportName"] = "${{ github.event.inputs.reportName }}"
          }

          Write-Host "Running Invoke-ARI..."

          Invoke-ARI @params

          Write-Host "Creating report output folder..."

          New-Item `
            -Path "$env:GITHUB_WORKSPACE/ari-reports" `
            -ItemType Directory `
            -Force

          Write-Host "Searching generated reports..."

          Get-ChildItem `
            -Path $HOME `
            -Filter "*.xlsx" `
            -Recurse `
            -ErrorAction SilentlyContinue |
            Move-Item `
            -Destination "$env:GITHUB_WORKSPACE/ari-reports/" `
            -Force

          Get-ChildItem `
            -Path $HOME `
            -Filter "*.xml" `
            -Recurse `
            -ErrorAction SilentlyContinue |
            Move-Item `
            -Destination "$env:GITHUB_WORKSPACE/ari-reports/" `
            -Force

          Write-Host "Generated files:"
          Get-ChildItem "$env:GITHUB_WORKSPACE/ari-reports"

      # Upload Report as GitHub Artifact
      - name: Upload GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-resource-inventory
          path: ari-reports/

      # Upload to Azure Blob Storage
      - name: Upload Reports to Azure Blob
        shell: pwsh
        run: |

          $storageAccount = "${{ secrets.AZURE_STORAGE_ACCOUNT }}"
          $container = "ari-reports"

          Write-Host "Creating Storage Context..."

          $ctx = New-AzStorageContext `
            -StorageAccountName $storageAccount `
            -UseConnectedAccount

          Write-Host "Uploading files to Blob Container..."

          Get-ChildItem `
            -Path "$env:GITHUB_WORKSPACE/ari-reports" `
            -File |
            ForEach-Object {

              Write-Host "Uploading file: $($_.Name)"

              Set-AzStorageBlobContent `
                -File $_.FullName `
                -Container $container `
                -Blob $_.Name `
                -Context $ctx `
                -Force
          }

      # Email Notification
      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          subject: Azure Resource Inventory Report - Run ID ${{ github.run_id }}

          body: |
            Hello Team,

            The Azure Resource Inventory execution completed successfully.

            Generated Reports:
            - Excel Inventory Report
            - XML Inventory Report

            Storage:
            Azure Blob Container: ari-reports

            Regards,
            Cloud Automation Team

          to: primary-recipient@example.com
          cc: manager@example.com

          from: Azure Inventory Automation <${{ secrets.EMAIL_USERNAME }}>

          attachments: |
            ari-reports/*.xlsx
            ari-reports/*.xml
