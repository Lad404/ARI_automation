name: Azure Resource Inventory (OIDC + Blob + Email)

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      subscriptionId:
        description: 'Specific subscription ID (optional)'
        required: false
        default: ''
      resourceGroup:
        description: 'Specific resource group (optional)'
        required: false
        default: ''
      reportName:
        description: 'Custom report name (optional)'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  run-inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Install Linux Graphics Dependencies for ImportExcel
        run: |
          sudo apt-get -y update
          sudo apt-get install -y --no-install-recommends libgdiplus libc6-dev

      - name: Download and Setup Stable ARI
        shell: pwsh
        run: |
          # 1. Install ImportExcel engine
          Install-Module -Name ImportExcel -Force -Scope CurrentUser

          # 2. Pull stable 3.1.2 zip bundle directly from PSGallery storage mirror
          $packageUrl = "https://www.powershellgallery.com/api/v2/package/AzureResourceInventory/3.1.2"
          Invoke-WebRequest -Uri $packageUrl -OutFile "$HOME/ari_stable.zip"
          
          # 3. Extract straight into the User Modules path so background jobs natively inherit it
          $TargetModuleDir = "$HOME/.local/share/powershell/Modules/AzureResourceInventory"
          New-Item -Path $TargetModuleDir -ItemType Directory -Force
          Expand-Archive -Path "$HOME/ari_stable.zip" -DestinationPath $TargetModuleDir -Force

      - name: Run ARI
        shell: pwsh
        run: |
          $TargetModuleDir = "$HOME/.local/share/powershell/Modules/AzureResourceInventory"
          $manifestPath = "$TargetModuleDir/AzureResourceInventory.psd1"

          # 1. Cleanly strip the missing Az.CostManagement module from the manifest array
          $manifestContent = Get-Content $manifestPath -Raw
          $manifestContent = $manifestContent -replace ",\s*'Az\.CostManagement'|\s*'Az\.CostManagement'\s*,", ""
          Set-Content -Path $manifestPath -Value $manifestContent -Force

          # 2. BRUTE-FORCE THE BACKGROUND THREADS: Inject an absolute function override file into the module's public scripts folder
          # This forces even background threads to load our fake Get-Package and Update-Module instead of using the OS defaults
          $OverrideCode = @"
          Function Update-Module { param([string]`$Name); Write-Output "Bypassed." }
          Function Get-Package { param([string]`$Name); return [PSCustomObject]@{ Name = 'AzureResourceInventory'; Version = '3.1.2' } }
          "@
          Set-Content -Path "$TargetModuleDir/modules/Public/PublicFunctions/BypassErrors.ps1" -Value $OverrideCode -Force

          # 3. Import the module cleanly
          Import-Module $manifestPath -Force

          $params = @{}
          if ("${{ github.event.inputs.subscriptionId }}" -ne "") {
              $params.Add("SubscriptionID", "${{ github.event.inputs.subscriptionId }}")
          }
          if ("${{ github.event.inputs.resourceGroup }}" -ne "") {
              $params.Add("ResourceGroup", "${{ github.event.inputs.resourceGroup }}")
          }
          if ("${{ github.event.inputs.reportName }}" -ne "") {
              $params.Add("ReportName", "${{ github.event.inputs.reportName }}")
          } else {
              $params.Add("ReportName", "AzureInventory_$(Get-Date -Format 'yyyyMMdd')")
          }

          # 4. Run the inventory script engine
          Invoke-ARI @params

          # 5. Prep workspace for extraction
          New-Item -Path "$env:GITHUB_WORKSPACE/ari-reports" -ItemType Directory -Force

          # CORRECTED EXTRACTION PATHS: Find the Excel files wherever they got generated on the file system
          Get-ChildItem -Path "$HOME" -Filter "*.xlsx" -Recurse -ErrorAction SilentlyContinue | Move-Item -Destination "$env:GITHUB_WORKSPACE/ari-reports/" -Force
          Get-ChildItem -Path "$HOME" -Filter "*.xml" -Recurse -ErrorAction SilentlyContinue | Move-Item -Destination "$env:GITHUB_WORKSPACE/ari-reports/" -Force

      - name: Upload to Azure Blob Storage
        shell: pwsh
        run: |
          $storageAccount = "${{ secrets.AZURE_STORAGE_ACCOUNT }}"
          $container = "ari-reports"
          $ctx = New-AzStorageContext -StorageAccountName $storageAccount -UseConnectedAccount

          Get-ChildItem -Path "$env:GITHUB_WORKSPACE/ari-reports" -File | ForEach-Object {
              Set-AzStorageBlobContent -File $_.FullName -Container $container -Blob $_.Name -Context $ctx -Force
          }

      - name: Send Email Notification with Attachment
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Azure Resource Inventory Report - Run ID ${{ github.run_id }}
          body: |
            Hello Team,
            
            The automated Azure Resource Inventory execution has completed successfully.
            
            - A long-term backup copy has been securely uploaded to the Azure Blob Container: "ari-reports".
            - The raw file has been attached directly to this distribution notification.
            
            Best Regards,
            Cloud Infrastructure Automation Bot
          to: primary-recipient@example.com, second-recipient@example.com
          cc: manager@example.com, supervisor@example.com
          from: Azure Inventory Automation <${{ secrets.EMAIL_USERNAME }}>
          attachments: |
            ari-reports/*
